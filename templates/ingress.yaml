{{- if .Values.exposure.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "clue-arena-app.fullname" . }}
  labels:
    {{- include "clue-arena-app.labels" . | nindent 4 }}
spec:
  {{- with .Values.exposure.ingressClassName }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.exposure.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "clue-arena-app.fullname" . }}
                port:
                  number: 3000
  {{- if .Values.exposure.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.exposure.host | quote }}
      secretName: {{ .Values.exposure.tls.secretName | quote }}
  {{- end }}
{{- end }}
