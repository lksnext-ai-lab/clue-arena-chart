{{- if eq (include "clue-arena-app.hasSecretData" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clue-arena-app.secretName" . }}
  labels:
    {{- include "clue-arena-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.app.auth.authSecret }}
  AUTH_SECRET: {{ .Values.app.auth.authSecret | quote }}
  {{- end }}
  {{- if .Values.app.auth.firebaseAdmin.projectId }}
  FIREBASE_PROJECT_ID: {{ .Values.app.auth.firebaseAdmin.projectId | quote }}
  {{- end }}
  {{- if .Values.app.auth.firebaseAdmin.clientEmail }}
  FIREBASE_ADMIN_CLIENT_EMAIL: {{ .Values.app.auth.firebaseAdmin.clientEmail | quote }}
  {{- end }}
  {{- if .Values.app.auth.firebaseAdmin.privateKey }}
  FIREBASE_ADMIN_PRIVATE_KEY: {{ .Values.app.auth.firebaseAdmin.privateKey | quote }}
  {{- end }}
  {{- if .Values.app.mcp.authToken }}
  MCP_AUTH_TOKEN: {{ .Values.app.mcp.authToken | quote }}
  {{- end }}
  {{- if .Values.app.agents.geminiApiKey }}
  GEMINI_API_KEY: {{ .Values.app.agents.geminiApiKey | quote }}
  {{- end }}
  {{- if .Values.app.agents.mattin.apiKey }}
  MATTIN_API_KEY: {{ .Values.app.agents.mattin.apiKey | quote }}
  {{- end }}
{{- end }}
