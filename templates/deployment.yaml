apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clue-arena-app.fullname" . }}
  labels:
    {{- include "clue-arena-app.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "clue-arena-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clue-arena-app.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "clue-arena-app.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: {{ include "clue-arena-app.name" . }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "clue-arena-app.configMapName" . }}
            {{- if eq (include "clue-arena-app.hasSecretData" .) "true" }}
            - secretRef:
                name: {{ include "clue-arena-app.secretName" . }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          {{- if .Values.app.database.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          {{- end }}
      {{- if .Values.app.database.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ default (include "clue-arena-app.fullname" .) .Values.app.database.persistence.existingClaim }}
      {{- end }}
