apiVersion: v1
kind: Pod
metadata:
  name: {{ include "clue-arena-app.fullname" . }}-test-connection
  labels:
    {{- include "clue-arena-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  automountServiceAccountToken: false
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36.1
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -ec
        - wget -qO- http://{{ include "clue-arena-app.fullname" . }}:3000/api/health
