name: Chart CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: chart-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing lint
        run: ct lint --config ct.yaml --charts .

  install:
    name: Install In Kind
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Prepare chart-testing values
        run: |
          sed -i "s|__GITHUB_OWNER__|${{ github.repository_owner }}|g" ci/ct-values.yaml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull application image
        run: docker pull ghcr.io/${{ github.repository_owner }}/clue-arena:dev

      - name: Load image into kind
        run: kind load docker-image ghcr.io/${{ github.repository_owner }}/clue-arena:dev

      - name: Run chart-testing install
        run: ct install --config ct.yaml --charts .

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get pods,svc,deploy,pvc --all-namespaces -o wide
          kubectl describe pods --all-namespaces
