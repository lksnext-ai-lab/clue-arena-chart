apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clue-arena-app.configMapName" . }}
  labels:
    {{- include "clue-arena-app.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ include "clue-arena-app.databaseUrl" . | quote }}
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  NODE_ENV: "production"
  DISABLE_AUTH: {{ .Values.app.auth.disableAuth | quote }}
  NEXT_PUBLIC_DISABLE_AUTH: {{ .Values.app.auth.disableAuth | quote }}
  DEMO_MODE: {{ .Values.app.auth.demoMode | quote }}
  AUTH_TRUST_HOST: {{ .Values.app.auth.trustHost | quote }}
  NEXT_PUBLIC_FIREBASE_AUTH_PROVIDER: {{ .Values.app.auth.firebaseAuthProviders | quote }}
  NEXT_PUBLIC_FIREBASE_API_KEY: {{ .Values.app.auth.firebaseClient.apiKey | quote }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: {{ .Values.app.auth.firebaseClient.authDomain | quote }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: {{ .Values.app.auth.firebaseClient.projectId | quote }}
  NEXT_PUBLIC_FIREBASE_APP_ID: {{ .Values.app.auth.firebaseClient.appId | quote }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: {{ .Values.app.auth.firebaseClient.messagingSenderId | quote }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: {{ .Values.app.auth.firebaseClient.storageBucket | quote }}
  NEXT_PUBLIC_APP_URL: {{ include "clue-arena-app.publicUrl" . | quote }}
  NEXT_PUBLIC_WS_URL: {{ .Values.app.websocketUrl | quote }}
  BOOTSTRAP_ADMIN_EMAIL: {{ .Values.app.bootstrapAdminEmail | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  AGENT_BACKEND: {{ .Values.app.agents.backend | quote }}
  GENKIT_MODEL: {{ .Values.app.agents.genkitModel | quote }}
  MATTIN_API_URL: {{ .Values.app.agents.mattin.apiUrl | quote }}
  WS_MAX_CONNECTIONS_PER_SESSION: {{ .Values.app.websocket.maxConnectionsPerSession | quote }}
  WS_HEARTBEAT_INTERVAL_MS: {{ .Values.app.websocket.heartbeatIntervalMs | quote }}
  SKIP_DB_MIGRATIONS: {{ .Values.app.database.skipMigrations | quote }}
