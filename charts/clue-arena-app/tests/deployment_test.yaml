suite: deployment
templates:
  - templates/deployment.yaml

tests:
  - it: renders the default deployment with persistent storage mounted
    set:
      image.tag: "0.1.0"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-clue-arena-app
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/lksnext-ai-lab/clue-arena:0.1.0
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: RELEASE-NAME-clue-arena-app-config
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: RELEASE-NAME-clue-arena-app
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /app/data
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].mountPath
          value: /app/public/avatars
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].subPath
          value: avatars

  - it: omits persistence resources when database persistence is disabled
    set:
      app.database.persistence.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.volumes
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts

  - it: reuses an existing persistent volume claim when configured
    set:
      app.database.persistence.existingClaim: existing-data
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: existing-data

  - it: injects the secret as an envFrom source when secret values are provided
    set:
      app.auth.authSecret: super-secret
      app.mcp.authToken: mcp-token
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: RELEASE-NAME-clue-arena-app-secret

  - it: adds custom pod annotations when configured
    set:
      podAnnotations.restartedAt: "2026-03-26T10:00:00Z"
    asserts:
      - equal:
          path: spec.template.metadata.annotations.restartedAt
          value: "2026-03-26T10:00:00Z"
