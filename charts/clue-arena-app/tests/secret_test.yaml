suite: secret
templates:
  - templates/secret.yaml

tests:
  - it: does not render a secret when no secret values are provided
    asserts:
      - hasDocuments:
          count: 0

  - it: renders only the configured secret values
    set:
      app.auth.authSecret: super-secret
      app.mcp.authToken: mcp-token
      app.agents.geminiApiKey: gemini-key
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.AUTH_SECRET
          value: super-secret
      - equal:
          path: stringData.MCP_AUTH_TOKEN
          value: mcp-token
      - equal:
          path: stringData.GEMINI_API_KEY
          value: gemini-key
